<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Eesha Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js"></script>
    <script src="../js/config/supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f0474a',
                        secondary: '#2c3e50',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        .cart-item {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        .cart-item:nth-child(1) { animation-delay: 0.05s; }
        .cart-item:nth-child(2) { animation-delay: 0.1s; }
        .cart-item:nth-child(3) { animation-delay: 0.15s; }
        .cart-item:nth-child(4) { animation-delay: 0.2s; }
        .cart-item:nth-child(5) { animation-delay: 0.25s; }
        
        .quantity-btn {
            transition: all 0.2s ease;
        }
        
        .quantity-btn:hover {
            transform: scale(1.1);
        }
        
        .quantity-btn:active {
            transform: scale(0.95);
        }
        
        .product-image {
            transition: transform 0.3s ease;
        }
        
        .product-image:hover {
            transform: scale(1.05);
        }
        
        .checkout-btn {
            background: linear-gradient(135deg, #f0474a 0%, #e03437 100%);
            transition: all 0.3s ease;
        }
        
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(240, 71, 74, 0.3);
        }
        
        .checkout-btn:active {
            transform: translateY(0);
        }
        
        .summary-card {
            background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
        }
        
        .delete-btn {
            transition: all 0.2s ease;
        }
        
        .delete-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .promo-input:focus {
            box-shadow: 0 0 0 3px rgba(240, 71, 74, 0.1);
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .empty-cart-icon {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="../index.html" class="flex items-center space-x-3">
                    <img src="shared/image.svg" alt="Eesha Logo" class="h-10 w-10">
                    <span class="text-xl font-bold text-gray-900">Eesha Shop</span>
                </a>
                <div class="flex items-center space-x-4">
                    <a href="../index.html" class="text-gray-600 hover:text-primary transition-colors">
                        <i class="fas fa-home text-xl"></i>
                    </a>
                    <a href="cart.html" class="relative text-primary">
                        <i class="fas fa-shopping-cart text-xl"></i>
                        <span id="cartCount" class="absolute -top-2 -right-2 bg-primary text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Breadcrumb -->
    <div class="bg-white border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
            <nav class="flex items-center space-x-2 text-sm text-gray-500">
                <a href="../index.html" class="hover:text-primary transition-colors">Home</a>
                <i class="fas fa-chevron-right text-xs"></i>
                <span class="text-gray-900 font-medium">Shopping Cart</span>
            </nav>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Title -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Shopping Cart</h1>
                <p class="text-gray-500 mt-1" id="cartSummary">Loading your cart...</p>
            </div>
            <a href="../index.html" class="hidden sm:flex items-center text-primary hover:text-red-600 transition-colors font-medium">
                <i class="fas fa-arrow-left mr-2"></i>
                Continue Shopping
            </a>
        </div>

        <!-- Cart Content -->
        <div id="cartContent">
            <!-- Loading Skeleton -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-4">
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center space-x-4">
                            <div class="skeleton w-24 h-24 rounded-xl"></div>
                            <div class="flex-1 space-y-3">
                                <div class="skeleton h-4 w-3/4 rounded"></div>
                                <div class="skeleton h-3 w-1/2 rounded"></div>
                                <div class="skeleton h-6 w-1/4 rounded"></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center space-x-4">
                            <div class="skeleton w-24 h-24 rounded-xl"></div>
                            <div class="flex-1 space-y-3">
                                <div class="skeleton h-4 w-3/4 rounded"></div>
                                <div class="skeleton h-3 w-1/2 rounded"></div>
                                <div class="skeleton h-6 w-1/4 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="skeleton h-6 w-1/2 rounded mb-6"></div>
                        <div class="space-y-4">
                            <div class="skeleton h-4 w-full rounded"></div>
                            <div class="skeleton h-4 w-3/4 rounded"></div>
                            <div class="skeleton h-10 w-full rounded mt-6"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-secondary text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>&copy; 2025 Eesha Shop. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const supabaseClient = window.supabase;
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadCart();
            await updateCartCount();
        });

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUser = session?.user || null;
        }

        async function updateCartCount() {
            try {
                let count = 0;
                
                if (currentUser) {
                    const { data: rows, error } = await supabaseClient
                        .from('cart_items')
                        .select('quantity')
                        .eq('user_id', currentUser.id);
                    
                    if (!error && rows) {
                        count = rows.reduce((s, r) => s + (r.quantity || 0), 0);
                    }
                } else {
                    const guestCart = JSON.parse(localStorage.getItem('cart') || '[]');
                    count = guestCart.reduce((s, i) => s + (i.quantity || 0), 0);
                }
                
                const el = document.getElementById('cartCount');
                if (el) el.textContent = count;
            } catch (err) {
                console.error('Error updating cart count:', err);
            }
        }

        async function loadCart() {
            const container = document.getElementById('cartContent');
            
            try {
                if (currentUser) {
                    await renderUserCart();
                } else {
                    await renderGuestCart();
                }
            } catch (error) {
                console.error('Error loading cart:', error);
                container.innerHTML = `
                    <div class="bg-white rounded-2xl p-12 text-center shadow-sm">
                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-exclamation-triangle text-2xl text-red-500"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-900 mb-2">Error Loading Cart</h3>
                        <p class="text-gray-500 mb-6">There was a problem loading your cart. Please try again.</p>
                        <button onclick="loadCart()" class="text-primary font-medium hover:underline">
                            <i class="fas fa-redo mr-2"></i>Try Again
                        </button>
                    </div>
                `;
            }
        }

        async function renderGuestCart() {
            const guestCart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cartContent');
            
            if (guestCart.length === 0) {
                renderEmptyCart();
                return;
            }

            const productIds = guestCart.map(item => item.productId || item.id).filter(Boolean);
            const { data: products } = await supabaseClient
                .from('products')
                .select('*')
                .in('id', productIds);

            const cartTotal = guestCart.reduce((sum, item) => {
                const product = products?.find(p => p.id === (item.productId || item.id));
                return sum + ((product?.price || 0) * (item.quantity || 1));
            }, 0);

            document.getElementById('cartSummary').textContent = `${guestCart.length} item${guestCart.length !== 1 ? 's' : ''} in your cart`;

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Cart Items -->
                    <div class="lg:col-span-2 space-y-4">
                        <div class="bg-gradient-to-r from-amber-50 to-yellow-50 border border-amber-200 rounded-xl p-4 mb-4">
                            <div class="flex items-center">
                                <i class="fas fa-info-circle text-amber-500 mr-3"></i>
                                <p class="text-amber-800 text-sm">
                                    <strong>Sign in</strong> to save your cart and access it from any device!
                                </p>
                                <a href="login.html?redirect=cart" class="ml-auto bg-amber-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-amber-600 transition-colors">
                                    Sign In
                                </a>
                            </div>
                        </div>
                        ${guestCart.map((item, index) => {
                            const product = products?.find(p => p.id === (item.productId || item.id));
                            if (!product) return '';
                            return renderCartItem(product, item.quantity, index);
                        }).join('')}
                    </div>
                    
                    <!-- Order Summary -->
                    ${renderOrderSummary(cartTotal, false)}
                </div>
            `;

            attachEventListeners();
        }

        async function renderUserCart() {
            const { data: cartItems, error } = await supabaseClient
                .from('cart_items')
                .select('id, quantity, product_id, products(*)')
                .eq('user_id', currentUser.id);

            if (error) throw error;

            if (!cartItems || cartItems.length === 0) {
                renderEmptyCart();
                return;
            }

            const cartTotal = cartItems.reduce((sum, item) => {
                return sum + ((item.products?.price || 0) * (item.quantity || 1));
            }, 0);

            document.getElementById('cartSummary').textContent = `${cartItems.length} item${cartItems.length !== 1 ? 's' : ''} in your cart`;

            const container = document.getElementById('cartContent');
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Cart Items -->
                    <div class="lg:col-span-2 space-y-4">
                        ${cartItems.map((item, index) => {
                            if (!item.products) return '';
                            return renderCartItem(item.products, item.quantity, index, item.id);
                        }).join('')}
                        
                        <!-- Continue Shopping -->
                        <a href="../index.html" class="flex items-center justify-center py-4 border-2 border-dashed border-gray-200 rounded-xl text-gray-500 hover:text-primary hover:border-primary transition-colors">
                            <i class="fas fa-plus mr-2"></i>
                            Add more items
                        </a>
                    </div>
                    
                    <!-- Order Summary -->
                    ${renderOrderSummary(cartTotal, true)}
                </div>
            `;

            attachEventListeners();
        }

        function renderCartItem(product, quantity, index, cartItemId = null) {
            const discount = product.original_price ? Math.round(((product.original_price - product.price) / product.original_price) * 100) : 0;
            const image = product.image || product.image_url || 'https://via.placeholder.com/200';
            const productId = product.id;
            
            return `
                <div class="cart-item bg-white rounded-2xl p-4 sm:p-6 shadow-sm hover:shadow-md transition-shadow" data-product-id="${productId}" data-cart-id="${cartItemId || ''}">
                    <div class="flex items-start gap-4">
                        <!-- Product Image -->
                        <div class="flex-shrink-0">
                            <a href="product.html?id=${productId}">
                                <img src="${image}" alt="${product.name || 'Product'}" 
                                     class="product-image w-24 h-24 sm:w-32 sm:h-32 rounded-xl object-cover cursor-pointer">
                            </a>
                        </div>
                        
                        <!-- Product Details -->
                        <div class="flex-1 min-w-0">
                            <div class="flex items-start justify-between gap-2">
                                <div>
                                    <a href="product.html?id=${productId}" class="text-gray-400 text-xs uppercase tracking-wide">${product.category || 'Category'}</a>
                                    <h3 class="text-lg font-semibold text-gray-900 mt-1 hover:text-primary transition-colors">
                                        <a href="product.html?id=${productId}">${product.name || 'Product Name'}</a>
                                    </h3>
                                </div>
                                <button onclick="removeItem(${productId}, '${cartItemId}')" 
                                        class="delete-btn p-2 rounded-lg text-gray-400 hover:text-red-500">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                            
                            <!-- Price & Discount -->
                            <div class="flex items-center gap-3 mt-2">
                                <span class="text-xl font-bold text-gray-900">$${(product.price || 0).toFixed(2)}</span>
                                ${product.original_price ? `
                                    <span class="text-sm text-gray-400 line-through">$${product.original_price.toFixed(2)}</span>
                                    <span class="bg-red-100 text-red-600 text-xs font-semibold px-2 py-1 rounded-full">-${discount}%</span>
                                ` : ''}
                            </div>
                            
                            <!-- Quantity Controls -->
                            <div class="flex items-center justify-between mt-4">
                                <div class="flex items-center bg-gray-100 rounded-xl p-1">
                                    <button onclick="updateQuantity(${productId}, ${quantity - 1}, '${cartItemId}')" 
                                            class="quantity-btn w-10 h-10 flex items-center justify-center rounded-lg bg-white shadow-sm hover:bg-gray-50 ${quantity <= 1 ? 'opacity-50 cursor-not-allowed' : ''}">
                                        <i class="fas fa-minus text-gray-600"></i>
                                    </button>
                                    <span class="w-14 text-center font-semibold text-gray-900">${quantity}</span>
                                    <button onclick="updateQuantity(${productId}, ${quantity + 1}, '${cartItemId}')" 
                                            class="quantity-btn w-10 h-10 flex items-center justify-center rounded-lg bg-white shadow-sm hover:bg-gray-50">
                                        <i class="fas fa-plus text-gray-600"></i>
                                    </button>
                                </div>
                                
                                <div class="text-right">
                                    <span class="text-sm text-gray-500">Subtotal</span>
                                    <p class="text-lg font-bold text-primary">$${((product.price || 0) * quantity).toFixed(2)}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrderSummary(cartTotal, isLoggedIn) {
            const shipping = cartTotal > 0 ? 10.00 : 0;
            const tax = cartTotal * 0.1;
            const total = cartTotal + shipping + tax;
            
            return `
                <div class="lg:col-span-1">
                    <div class="summary-card bg-white rounded-2xl shadow-sm p-6 sticky top-24">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Order Summary</h2>
                        
                        <!-- Promo Code -->
                        <div class="mb-6">
                            <label class="text-sm font-medium text-gray-700 mb-2 block">Promo Code</label>
                            <div class="flex gap-2">
                                <input type="text" placeholder="Enter code" 
                                       class="promo-input flex-1 px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-primary transition-colors">
                                <button class="px-4 py-3 bg-gray-900 text-white rounded-xl font-medium hover:bg-gray-800 transition-colors">
                                    Apply
                                </button>
                            </div>
                        </div>
                        
                        <div class="space-y-4 border-t pt-4">
                            <div class="flex justify-between text-gray-600">
                                <span>Subtotal</span>
                                <span class="font-medium">$${cartTotal.toFixed(2)}</span>
                            </div>
                            <div class="flex justify-between text-gray-600">
                                <span>Shipping</span>
                                <span class="font-medium">${shipping > 0 ? '$' + shipping.toFixed(2) : 'Free'}</span>
                            </div>
                            <div class="flex justify-between text-gray-600">
                                <span>Tax (10%)</span>
                                <span class="font-medium">$${tax.toFixed(2)}</span>
                            </div>
                            
                            ${cartTotal > 100 ? `
                                <div class="bg-green-50 border border-green-200 rounded-xl p-3 text-sm text-green-700">
                                    <i class="fas fa-check-circle mr-2"></i>
                                    You're saving $${shipping.toFixed(2)} on shipping!
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="border-t mt-4 pt-4">
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-lg font-bold text-gray-900">Total</span>
                                <span class="text-2xl font-bold text-primary">$${total.toFixed(2)}</span>
                            </div>
                            
                            <button onclick="proceedToCheckout()" 
                                    class="checkout-btn w-full py-4 text-white font-semibold rounded-xl flex items-center justify-center gap-2">
                                <i class="fas fa-lock"></i>
                                Proceed to Checkout
                            </button>
                            
                            <p class="text-xs text-gray-500 text-center mt-4">
                                <i class="fas fa-shield-alt mr-1"></i>
                                Secure checkout powered by Stripe
                            </p>
                        </div>
                        
                        <!-- Payment Methods -->
                        <div class="mt-6 pt-6 border-t">
                            <p class="text-xs text-gray-500 text-center mb-3">We accept</p>
                            <div class="flex justify-center gap-3 text-2xl text-gray-400">
                                <i class="fab fa-cc-visa"></i>
                                <i class="fab fa-cc-mastercard"></i>
                                <i class="fab fa-cc-amex"></i>
                                <i class="fab fa-cc-paypal"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEmptyCart() {
            document.getElementById('cartSummary').textContent = 'Your cart is empty';
            
            document.getElementById('cartContent').innerHTML = `
                <div class="bg-white rounded-2xl p-12 text-center shadow-sm max-w-2xl mx-auto fade-in">
                    <div class="empty-cart-icon w-32 h-32 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-shopping-cart text-5xl text-gray-300"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-gray-900 mb-2">Your cart is empty</h2>
                    <p class="text-gray-500 mb-8">Looks like you haven't added any items to your cart yet. Start shopping to fill it up!</p>
                    <div class="flex flex-col sm:flex-row gap-4 justify-center">
                        <a href="../index.html" class="px-8 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-red-600 transition-colors">
                            <i class="fas fa-shopping-bag mr-2"></i>Start Shopping
                        </a>
                        ${!currentUser ? `
                            <a href="login.html?redirect=cart" class="px-8 py-3 border-2 border-gray-200 text-gray-700 font-semibold rounded-xl hover:border-gray-300 transition-colors">
                                <i class="fas fa-user mr-2"></i>Sign In
                            </a>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        async function updateQuantity(productId, newQuantity, cartItemId) {
            if (newQuantity < 1) {
                removeItem(productId, cartItemId);
                return;
            }

            try {
                if (currentUser) {
                    const { error } = await supabaseClient
                        .from('cart_items')
                        .update({ quantity: newQuantity })
                        .eq('user_id', currentUser.id)
                        .eq('product_id', productId);

                    if (error) throw error;
                } else {
                    const guestCart = JSON.parse(localStorage.getItem('cart') || '[]');
                    const itemIndex = guestCart.findIndex(i => (i.productId || i.id) === productId);
                    if (itemIndex !== -1) {
                        guestCart[itemIndex].quantity = newQuantity;
                        localStorage.setItem('cart', JSON.stringify(guestCart));
                    }
                }

                await loadCart();
                await updateCartCount();
            } catch (error) {
                console.error('Error updating quantity:', error);
                alert('Failed to update quantity. Please try again.');
            }
        }

        async function removeItem(productId, cartItemId) {
            if (!confirm('Remove this item from your cart?')) return;

            try {
                if (currentUser) {
                    const { error } = await supabaseClient
                        .from('cart_items')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .eq('product_id', productId);

                    if (error) throw error;
                } else {
                    const guestCart = JSON.parse(localStorage.getItem('cart') || '[]');
                    const updatedCart = guestCart.filter(i => (i.productId || i.id) !== productId);
                    localStorage.setItem('cart', JSON.stringify(updatedCart));
                }

                await loadCart();
                await updateCartCount();
            } catch (error) {
                console.error('Error removing item:', error);
                alert('Failed to remove item. Please try again.');
            }
        }

        async function proceedToCheckout() {
            if (!currentUser) {
                window.location.href = 'login.html?redirect=cart';
                return;
            }

            try {
                const { data: cartItems, error } = await supabaseClient
                    .from('cart_items')
                    .select('*, products(*)')
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                if (!cartItems || cartItems.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }

                const items = cartItems.map(item => ({
                    product_id: item.product_id,
                    name: item.products?.name || '',
                    quantity: item.quantity,
                    price: item.products?.price || 0,
                    total: (item.products?.price || 0) * item.quantity
                }));

                const cartTotal = items.reduce((sum, item) => sum + item.total, 0);
                const shipping = 10.00;
                const tax = cartTotal * 0.1;
                const total = cartTotal + shipping + tax;

                const { data: pendingOrder, error: pendingError } = await supabaseClient
                    .from('pending_orders')
                    .insert([{
                        user_id: currentUser.id,
                        items: items,
                        subtotal: cartTotal,
                        shipping: shipping,
                        tax: tax,
                        total: total
                    }])
                    .select()
                    .single();

                if (pendingError) throw pendingError;

                localStorage.setItem('pendingOrderId', pendingOrder.id);
                window.location.href = 'checkout.html';

            } catch (error) {
                console.error('Error proceeding to checkout:', error);
                alert('There was an error processing your cart. Please try again.');
            }
        }

        function attachEventListeners() {
            // Any additional event listeners can be added here
        }
    </script>
</body>
</html>
