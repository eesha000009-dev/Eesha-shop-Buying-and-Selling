<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Eesha Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js"></script>
    <script src="../js/config/supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f0474a',
                        secondary: '#2c3e50',
                    }
                }
            }
        }
    </script>
    <style>
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="../index.html" class="flex items-center">
                <img src="shared/image.svg" alt="Eesha Logo" class="h-12 w-12">
                <span class="text-xl font-bold ml-2">Eesha Shop</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-gray-600 hover:text-primary">
                    <i class="fas fa-home text-xl"></i>
                </a>
                <a href="cart.html" class="text-gray-600 hover:text-primary relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-primary text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
                </a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Back Link -->
        <a href="../index.html" class="inline-flex items-center text-gray-600 hover:text-primary mb-6">
            <i class="fas fa-arrow-left mr-2"></i> Back to Home
        </a>

        <div class="max-w-6xl mx-auto">
            <!-- Page Title -->
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
                <div class="flex gap-2">
                    <select id="filterStatus" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary">
                        <option value="all">All Orders</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <!-- Order Stats -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <div class="text-2xl font-bold text-yellow-500" id="pendingCount">0</div>
                    <div class="text-sm text-gray-500">Pending</div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <div class="text-2xl font-bold text-blue-500" id="processingCount">0</div>
                    <div class="text-sm text-gray-500">Processing</div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <div class="text-2xl font-bold text-purple-500" id="shippedCount">0</div>
                    <div class="text-sm text-gray-500">Shipped</div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <div class="text-2xl font-bold text-green-500" id="deliveredCount">0</div>
                    <div class="text-sm text-gray-500">Delivered</div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow text-center">
                    <div class="text-2xl font-bold text-red-500" id="cancelledCount">0</div>
                    <div class="text-sm text-gray-500">Cancelled</div>
                </div>
            </div>

            <!-- Orders List -->
            <div id="ordersList" class="space-y-4">
                <!-- Loading state -->
                <div class="bg-white rounded-lg shadow p-8 text-center">
                    <i class="fas fa-spinner loading text-4xl text-primary mb-4"></i>
                    <p class="text-gray-500">Loading your orders...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Order Detail Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Order Details</h2>
                <button onclick="closeOrderModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="orderModalContent" class="p-6">
                <!-- Content will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-secondary text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2025 Eesha Shop. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const supabaseClient = window.supabase;
        let currentUser = null;
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadOrders();
            await updateCartCount();
        });

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session?.user) {
                window.location.href = 'login.html?redirect=orders';
                return;
            }
            currentUser = session.user;
        }

        async function loadOrders() {
            if (!currentUser) return;

            const { data: orders, error } = await supabaseClient
                .from('buyers_orders')
                .select(`
                    *,
                    buyers_order_items(
                        id,
                        quantity,
                        price,
                        product_name,
                        product_image,
                        products(id, name, image_url, image)
                    )
                `)
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading orders:', error);
                
                // Check if table doesn't exist
                if (error.code === '42P01' || error.message?.includes('does not exist')) {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="bg-white rounded-lg shadow p-8 text-center">
                            <i class="fas fa-database text-6xl text-gray-300 mb-4"></i>
                            <h3 class="text-xl font-semibold text-gray-700 mb-2">Orders Table Not Set Up</h3>
                            <p class="text-gray-500 mb-4">The buyers_orders table needs to be created in Supabase.</p>
                            <p class="text-sm text-gray-400 mb-6">Please run the migration SQL (007_buyers_tables.sql) in your Supabase SQL Editor.</p>
                            <a href="../index.html" class="inline-block bg-primary text-white px-6 py-2 rounded-lg hover:bg-red-600">
                                Continue Shopping
                            </a>
                        </div>
                    `;
                } else {
                    document.getElementById('ordersList').innerHTML = `
                        <div class="bg-white rounded-lg shadow p-8 text-center text-red-500">
                            <i class="fas fa-exclamation-circle text-4xl mb-4"></i>
                            <p>Failed to load orders. Please try again.</p>
                        </div>
                    `;
                }
                return;
            }

            allOrders = orders || [];
            updateStats();
            renderOrders(allOrders);

            // Set up filter
            document.getElementById('filterStatus').addEventListener('change', (e) => {
                const status = e.target.value;
                const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status?.toLowerCase() === status);
                renderOrders(filtered);
            });
        }

        function updateStats() {
            const stats = {
                pending: 0,
                processing: 0,
                shipped: 0,
                delivered: 0,
                cancelled: 0
            };

            allOrders.forEach(order => {
                const status = (order.status || 'pending').toLowerCase();
                if (stats.hasOwnProperty(status)) {
                    stats[status]++;
                }
            });

            Object.keys(stats).forEach(key => {
                const el = document.getElementById(key + 'Count');
                if (el) el.textContent = stats[key];
            });
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-lg shadow p-8 text-center">
                        <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
                        <h3 class="text-xl font-semibold text-gray-700 mb-2">No orders found</h3>
                        <p class="text-gray-500 mb-6">You haven't placed any orders yet.</p>
                        <a href="../index.html" class="inline-block bg-primary text-white px-6 py-2 rounded-lg hover:bg-red-600">
                            Start Shopping
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => {
                const statusClass = getStatusClass(order.status);
                const items = order.buyers_order_items || [];
                const itemPreview = items.slice(0, 3);
                const moreItems = items.length - 3;

                return `
                    <div class="bg-white rounded-lg shadow hover:shadow-lg transition cursor-pointer" onclick="viewOrder('${order.id}')">
                        <div class="p-6">
                            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                                <div class="flex items-center gap-4">
                                    <div class="flex -space-x-2">
                                        ${itemPreview.map(item => `
                                            <img src="${item.product_image || item.products?.image_url || item.products?.image || 'https://via.placeholder.com/50'}" 
                                                 alt="${item.product_name || item.products?.name || 'Product'}"
                                                 class="w-12 h-12 rounded-lg border-2 border-white object-cover">
                                        `).join('')}
                                        ${moreItems > 0 ? `
                                            <div class="w-12 h-12 rounded-lg bg-gray-200 flex items-center justify-center text-sm font-medium text-gray-600">
                                                +${moreItems}
                                            </div>
                                        ` : ''}
                                    </div>
                                    <div>
                                        <h3 class="font-semibold">Order #${order.id.slice(0, 8).toUpperCase()}</h3>
                                        <p class="text-sm text-gray-500">${items.length} item${items.length !== 1 ? 's' : ''}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="font-bold text-lg">$${(order.total || 0).toFixed(2)}</p>
                                    <p class="text-sm text-gray-500">${new Date(order.created_at).toLocaleDateString()}</p>
                                </div>
                            </div>
                            <div class="mt-4 flex items-center justify-between">
                                <span class="px-3 py-1 rounded-full text-sm font-medium ${statusClass}">
                                    ${order.status || 'Pending'}
                                </span>
                                <span class="text-primary text-sm font-medium">
                                    View Details <i class="fas fa-chevron-right ml-1"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusClass(status) {
            const classes = {
                pending: 'bg-yellow-100 text-yellow-800',
                processing: 'bg-blue-100 text-blue-800',
                shipped: 'bg-purple-100 text-purple-800',
                delivered: 'bg-green-100 text-green-800',
                cancelled: 'bg-red-100 text-red-800'
            };
            return classes[(status || 'pending').toLowerCase()] || 'bg-gray-100 text-gray-800';
        }

        async function viewOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            const items = order.buyers_order_items || [];
            const statusClass = getStatusClass(order.status);

            document.getElementById('orderModalContent').innerHTML = `
                <div class="space-y-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-sm text-gray-500">Order ID</p>
                            <p class="font-mono font-bold">#${order.id.slice(0, 8).toUpperCase()}</p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-sm font-medium ${statusClass}">
                            ${order.status || 'Pending'}
                        </span>
                    </div>

                    <div class="border-t pt-4">
                        <h4 class="font-semibold mb-3">Order Items</h4>
                        <div class="space-y-3">
                            ${items.map(item => `
                                <div class="flex items-center gap-3">
                                    <img src="${item.product_image || item.products?.image_url || item.products?.image || 'https://via.placeholder.com/60'}" 
                                         alt="${item.product_name || item.products?.name || 'Product'}"
                                         class="w-16 h-16 rounded-lg object-cover">
                                    <div class="flex-1">
                                        <p class="font-medium">${item.product_name || item.products?.name || 'Unknown Product'}</p>
                                        <p class="text-sm text-gray-500">Qty: ${item.quantity}</p>
                                    </div>
                                    <p class="font-semibold">$${(item.price * item.quantity).toFixed(2)}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="border-t pt-4 space-y-2">
                        <div class="flex justify-between">
                            <span class="text-gray-500">Subtotal</span>
                            <span>$${(order.subtotal || order.total || 0).toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">Shipping</span>
                            <span>$${(order.shipping || 0).toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">Tax</span>
                            <span>$${(order.tax || 0).toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between font-bold text-lg pt-2 border-t">
                            <span>Total</span>
                            <span>$${(order.total || 0).toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="border-t pt-4">
                        <h4 class="font-semibold mb-2">Order Date</h4>
                        <p class="text-gray-600">${new Date(order.created_at).toLocaleString()}</p>
                    </div>

                    ${order.tracking_number ? `
                        <div class="border-t pt-4">
                            <h4 class="font-semibold mb-2">Tracking Number</h4>
                            <p class="font-mono text-primary">${order.tracking_number}</p>
                        </div>
                    ` : ''}

                    <div class="flex gap-3 pt-4">
                        <button onclick="closeOrderModal()" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                            Close
                        </button>
                        ${order.status === 'delivered' ? `
                            <button class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-red-600">
                                Write Review
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;

            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        async function updateCartCount() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const user = session?.user;
            let count = 0;

            if (user) {
                const { data: rows } = await supabaseClient
                    .from('cart_items')
                    .select('quantity')
                    .eq('user_id', user.id);
                if (rows) count = rows.reduce((s, r) => s + (r.quantity || 0), 0);
            }

            const el = document.getElementById('cartCount');
            if (el) el.textContent = count;
        }

        // Close modal on outside click
        document.getElementById('orderModal').addEventListener('click', (e) => {
            if (e.target.id === 'orderModal') closeOrderModal();
        });
    </script>
</body>
</html>
