<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories — EeshaMart</title>
    <meta name="description" content="Browse all categories on EeshaMart - Nigeria's #1 Marketplace">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind & Supabase -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #ffffff;
            color: #1f2937;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f5f5f5; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .category-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .category-card { transition: all 0.3s ease; }
        
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .product-card { transition: all 0.3s ease; }
        
        .filter-btn.active { background: #f97316; color: white; border-color: #f97316; }
    </style>
</head>

<body class="min-h-screen pb-20 lg:pb-0">
    <!-- Header -->

                                    <stop offset="0%" stop-color="#fbbf24"/>
                                    <stop offset="50%" stop-color="#f59e0b"/>
                                    <stop offset="100%" stop-color="#d97706"/>
                                </linearGradient>
                            </defs>
                            <path d="M8 15 L8 50 Q8 54 12 54 L48 54 Q52 54 52 50 L52 15 Q52 11 48 11 L12 11 Q8 11 8 15 Z" fill="url(#headerLogoGrad)"/>
                            <path d="M18 11 Q18 2 30 2 Q42 2 42 11" fill="none" stroke="url(#headerLogoGrad)" stroke-width="4" stroke-linecap="round"/>

                        </svg>

                    <i class="fas fa-search text-gray-400 mr-2 text-sm"></i>

    <!-- Scripts -->
    <script src="../js/config/supabase.js"></script>
    <script>
        const supabaseClient = window.supabase;
        let currentCategory = '';
        let currentSearch = '';
        let currentSort = 'newest';
        let currentPrice = '';
        let currentSeller = '';
        let products = [];
        let page = 0;
        const pageSize = 20;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            checkAuthState();
            
            // Get parameters from URL
            const params = new URLSearchParams(window.location.search);
            const cat = params.get('category');
            const search = params.get('search');
            
            // Set search input value if search param exists
            if (search) {
                currentSearch = search;
                const searchInput = document.getElementById('searchInput');
                if (searchInput) searchInput.value = search;
                updatePageTitle(search, '');
            }
            
            if (cat) {
                filterByCategory(cat);
            } else {
                loadProducts();
            }
        });
        
        // Update page title based on filters
        function updatePageTitle(search, category) {
            const titleEl = document.querySelector('main h1');
            const descEl = document.querySelector('main h1 + p');
            
            if (search && category) {
                titleEl.textContent = `"${search}" in ${category}`;
                descEl.textContent = 'Search results';
            } else if (search) {
                titleEl.textContent = `Search: "${search}"`;
                descEl.textContent = 'Showing search results';
            } else if (category) {
                titleEl.textContent = category.charAt(0).toUpperCase() + category.slice(1);
                descEl.textContent = 'Browse products in this category';
            } else {
                titleEl.textContent = 'All Categories';
                descEl.textContent = 'Browse products by category';
            }
        }

        // Auth State
        async function checkAuthState() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                const accountBtn = document.getElementById('accountBtn');
                const mobileAccountBtn = document.getElementById('mobileAccountBtn');
                const loggedInCheck = document.getElementById('loggedInCheck');
                const mobileLoggedInCheck = document.getElementById('mobileLoggedInCheck');
                
                if (session?.user) {
                    accountBtn.href = 'profile.html';
                    mobileAccountBtn.href = 'profile.html';
                    loggedInCheck.classList.remove('hidden');
                    mobileLoggedInCheck.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // Filter by Category
        function filterByCategory(category) {
            currentCategory = category;
            page = 0;
            products = [];
            
            // Clear search when changing category
            currentSearch = '';
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = '';
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category || (category === '' && !btn.dataset.category)) {
                    btn.classList.add('active');
                }
            });
            
            // Update URL
            const url = new URL(window.location);
            if (category) {
                url.searchParams.set('category', category);
            } else {
                url.searchParams.delete('category');
            }
            url.searchParams.delete('search');
            window.history.replaceState({}, '', url);
            
            // Update page title
            updatePageTitle('', category);
            
            loadProducts();
        }

        // Apply Filters
        function applyFilters() {
            currentSort = document.getElementById('sortSelect').value;
            currentPrice = document.getElementById('priceSelect').value;
            currentSeller = document.getElementById('sellerSelect').value;
            page = 0;
            products = [];
            loadProducts();
        }

        // Load Products
        async function loadProducts() {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const productsGrid = document.getElementById('productsGrid');
            
            loadingState.classList.remove('hidden');
            emptyState.classList.add('hidden');
            
            try {
                let query = supabaseClient
                    .from('products')
                    .select('*, sellers(name, seller_type)', { count: 'exact' })
                    .eq('status', 'active');
                
                // Search filter - search in name and description
                if (currentSearch) {
                    query = query.or(`name.ilike.%${currentSearch}%,description.ilike.%${currentSearch}%,category.ilike.%${currentSearch}%`);
                }
                
                // Category filter
                if (currentCategory) {
                    query = query.eq('category', currentCategory);
                }
                
                // Price filter
                if (currentPrice) {
                    if (currentPrice === '50000+') {
                        query = query.gte('price', 50000);
                    } else {
                        const [min, max] = currentPrice.split('-');
                        query = query.gte('price', parseInt(min)).lte('price', parseInt(max));
                    }
                }
                
                // Seller type filter
                if (currentSeller) {
                    // This requires a join, handled differently
                }
                
                // Sort
                switch (currentSort) {
                    case 'newest':
                        query = query.order('created_at', { ascending: false });
                        break;
                    case 'popular':
                        query = query.order('views', { ascending: false });
                        break;
                    case 'price-low':
                        query = query.order('price', { ascending: true });
                        break;
                    case 'price-high':
                        query = query.order('price', { ascending: false });
                        break;
                }
                
                query = query.range(page * pageSize, (page + 1) * pageSize - 1);
                
                const { data, count, error } = await query;
                
                if (error) throw error;
                
                document.getElementById('resultsCount').textContent = count || 0;
                
                if (data && data.length > 0) {
                    products = [...products, ...data];
                    renderProducts(data);
                    
                    // Show load more if there are more products
                    const loadMoreSection = document.getElementById('loadMoreSection');
                    if (products.length < count) {
                        loadMoreSection.classList.remove('hidden');
                    } else {
                        loadMoreSection.classList.add('hidden');
                    }
                } else if (products.length === 0) {
                    emptyState.classList.remove('hidden');
                    productsGrid.innerHTML = '';
                }
                
            } catch (error) {
                console.error('Error loading products:', error);
                emptyState.classList.remove('hidden');
            } finally {
                loadingState.classList.add('hidden');
            }
        }

        // Render Products
        function renderProducts(data) {
            const productsGrid = document.getElementById('productsGrid');
            
            if (page === 0) {
                productsGrid.innerHTML = '';
            }
            
            data.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-xl border border-gray-100 overflow-hidden cursor-pointer';
                card.onclick = () => window.location.href = `product.html?id=${product.id}`;
                
                const sellerType = product.sellers?.seller_type;
                const sellerBadge = sellerType === 'farmer' 
                    ? '<span class="bg-green-100 text-green-700 text-[10px] px-1.5 py-0.5 rounded-full">Farm Fresh</span>'
                    : '';
                
                const discount = product.discount_percentage || 0;
                const originalPrice = discount > 0 ? product.price / (1 - discount/100) : null;
                
                card.innerHTML = `
                    <div class="relative">
                        <img src="${product.images?.[0] || 'https://via.placeholder.com/300'}" 
                             alt="${product.name}" 
                             class="w-full h-28 lg:h-40 object-cover">
                        ${discount > 0 ? `<span class="absolute top-2 left-2 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">-${discount}%</span>` : ''}
                        <button onclick="event.stopPropagation(); toggleWishlist(${product.id})" class="absolute top-2 right-2 w-7 h-7 bg-white rounded-full flex items-center justify-center shadow hover:bg-gray-50">
                            <i class="far fa-heart text-gray-400 text-xs"></i>
                        </button>
                    </div>
                    <div class="p-2 lg:p-3">
                        <div class="flex items-center gap-1 mb-1">
                            ${sellerBadge}
                        </div>
                        <h3 class="text-xs lg:text-sm font-medium text-gray-900 line-clamp-2 mb-1">${product.name}</h3>
                        <div class="flex items-center gap-1 mb-2">
                            <span class="text-sm lg:text-base font-bold text-gray-900">₦${product.price?.toLocaleString()}</span>
                            ${originalPrice ? `<span class="text-[10px] text-gray-400 line-through">₦${originalPrice.toFixed(0)}</span>` : ''}
                        </div>
                        <button onclick="event.stopPropagation(); addToCart(${product.id})" class="w-full bg-orange-500 text-white py-1.5 lg:py-2 rounded-lg text-xs font-medium hover:bg-orange-600 transition-colors">
                            Add to Cart
                        </button>
                    </div>
                `;
                
                productsGrid.appendChild(card);
            });
        }

        // Load More Products
        function loadMoreProducts() {
            page++;
            loadProducts();
        }

        // Add to Cart
        async function addToCart(productId) {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session?.user) {
                    document.getElementById('authModal').classList.remove('hidden');
                    document.getElementById('authModal').classList.add('flex');
                    return;
                }
                
                // Check if item exists in cart
                const { data: existing } = await supabaseClient
                    .from('cart_items')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .eq('product_id', productId)
                    .single();
                
                if (existing) {
                    await supabaseClient
                        .from('cart_items')
                        .update({ quantity: existing.quantity + 1 })
                        .eq('id', existing.id);
                } else {
                    await supabaseClient
                        .from('cart_items')
                        .insert([{ user_id: session.user.id, product_id: productId, quantity: 1 }]);
                }
                
                updateCartCount();
                showNotification('Added to cart!');
                
            } catch (error) {
                console.error('Add to cart error:', error);
                showNotification('Error adding to cart', 'error');
            }
        }

        // Toggle Wishlist
        async function toggleWishlist(productId) {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (!session?.user) {
                    document.getElementById('authModal').classList.remove('hidden');
                    document.getElementById('authModal').classList.add('flex');
                    return;
                }
                
                // Toggle wishlist logic here
                showNotification('Added to wishlist!');
                
            } catch (error) {
                console.error('Wishlist error:', error);
            }
        }

        // Update Cart Count
        async function updateCartCount() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session?.user) return;
                
                const { count } = await supabaseClient
                    .from('cart_items')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', session.user.id);
                
                document.getElementById('cartCount').textContent = count || 0;
                document.getElementById('mobileCartCount').textContent = count || 0;
            } catch (error) {
                console.error('Cart count error:', error);
            }
        }

        // Close Auth Modal
        function closeAuthModal() {
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('authModal').classList.remove('flex');
        }

        // Show Notification
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `fixed top-20 right-4 px-4 py-2 rounded-lg text-sm font-medium z-50 ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 2000);
        }
        
        // ===== Search Functions =====
        function handleSearchKeypress(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }
        
        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.trim();
            
            currentSearch = query;
            currentCategory = '';
            page = 0;
            products = [];
            
            // Update URL
            const url = new URL(window.location);
            if (query) {
                url.searchParams.set('search', query);
            } else {
                url.searchParams.delete('search');
            }
            url.searchParams.delete('category');
            window.history.replaceState({}, '', url);
            
            // Update title
            updatePageTitle(query, '');
            
            // Reset category buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (!btn.dataset.category) {
                    btn.classList.add('active');
                }
            });
            
            loadProducts();
        }
    </script>
</body>
</html>
