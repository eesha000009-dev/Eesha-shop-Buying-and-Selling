<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - Farmer Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js"></script>
    <script src="../js/config/supabase.js"></script>
    <link rel="stylesheet" href="../css/loader.css">
    <script src="../js/loader.js"></script>
    <script>
        // Auth check
        (async function checkAuth() {
            try {
                const { data: { session }, error } = await window.supabase.auth.getSession();
                if (error || !session) {
                    window.location.href = 'login.html';
                    return;
                }
            } catch (error) {
                console.error('Auth check error:', error);
                window.location.href = 'login.html';
            }
        })();
    </script>
    <style>
        :root {
            --primary-color: #059669;
            --primary-light: #10B981;
            --primary-dark: #047857;
            --dark-color: #14532d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
            min-height: 100vh;
        }

        .orders-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: var(--dark-color);
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stat-box h3 {
            font-size: 2rem;
            color: var(--dark-color);
        }

        .stat-box p {
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .stat-box.pending { border-left: 4px solid #eab308; }
        .stat-box.processing { border-left: 4px solid #3b82f6; }
        .stat-box.delivered { border-left: 4px solid #22c55e; }
        .stat-box.total { border-left: 4px solid var(--primary-color); }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #d1fae5;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--dark-color);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .order-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #f0fdf4;
        }

        .order-info {
            flex: 1;
        }

        .order-info h3 {
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .order-info p {
            color: #6b7280;
            font-size: 0.875rem;
        }

        .order-meta {
            text-align: right;
        }

        .order-meta .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-confirmed { background: #dbeafe; color: #1e40af; }
        .status-processing { background: #e0e7ff; color: #3730a3; }
        .status-shipped { background: #fce7f3; color: #9d174d; }
        .status-delivered { background: #d1fae5; color: #065f46; }
        .status-cancelled { background: #fef2f2; color: #991b1b; }

        .order-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s;
        }

        .action-btn.primary {
            background: var(--primary-color);
            color: white;
        }

        .action-btn.primary:hover {
            background: var(--primary-dark);
        }

        .action-btn.secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .action-btn.secondary:hover {
            background: #e5e7eb;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6b7280;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .order-card {
                flex-direction: column;
                text-align: center;
            }
            .order-meta {
                text-align: center;
            }
            .order-actions {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="orders-container">
        <div class="page-header">
            <div>
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to Dashboard
                </a>
                <h1 style="margin-top: 0.5rem;"><i class="fas fa-shopping-basket mr-2"></i>Farm Orders</h1>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box pending">
                <h3 id="pendingCount">0</h3>
                <p>Pending</p>
            </div>
            <div class="stat-box processing">
                <h3 id="processingCount">0</h3>
                <p>Processing</p>
            </div>
            <div class="stat-box delivered">
                <h3 id="deliveredCount">0</h3>
                <p>Delivered</p>
            </div>
            <div class="stat-box total">
                <h3 id="totalCount">0</h3>
                <p>Total Orders</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Orders</button>
            <button class="filter-btn" data-filter="PENDING">Pending</button>
            <button class="filter-btn" data-filter="CONFIRMED">Confirmed</button>
            <button class="filter-btn" data-filter="PROCESSING">Processing</button>
            <button class="filter-btn" data-filter="SHIPPED">Shipped</button>
            <button class="filter-btn" data-filter="DELIVERED">Delivered</button>
        </div>

        <!-- Orders List -->
        <div class="orders-list" id="ordersList">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No orders yet</p>
            </div>
        </div>
    </div>

    <script>
        let supabase;
        let currentUser = null;
        let allOrders = [];

        document.addEventListener('DOMContentLoaded', async () => {
            supabase = window.supabase;

            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;

            await loadOrders();
            setupFilters();
        });

        async function loadOrders() {
            const { data: orders, error } = await supabase
                .from('orders')
                .select(`
                    *,
                    order_items(
                        quantity,
                        price,
                        products(name, image_url, image)
                    )
                `)
                .eq('seller_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (!error) {
                allOrders = orders || [];
                updateStats();
                renderOrders('all');
            }
        }

        function updateStats() {
            const pending = allOrders.filter(o => o.status === 'PENDING').length;
            const processing = allOrders.filter(o => o.status === 'PROCESSING' || o.status === 'CONFIRMED').length;
            const delivered = allOrders.filter(o => o.status === 'DELIVERED').length;

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('processingCount').textContent = processing;
            document.getElementById('deliveredCount').textContent = delivered;
            document.getElementById('totalCount').textContent = allOrders.length;
        }

        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderOrders(btn.dataset.filter);
                });
            });
        }

        function renderOrders(filter) {
            const container = document.getElementById('ordersList');
            let filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No orders found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(order => {
                const item = order.order_items?.[0];
                const product = item?.products;
                const statusClass = `status-${order.status.toLowerCase()}`;

                return `
                    <div class="order-card">
                        <img src="${product?.image_url || product?.image || 'https://via.placeholder.com/80'}" 
                             alt="${product?.name || 'Product'}" 
                             class="order-image">
                        <div class="order-info">
                            <h3>${product?.name || 'Unknown Product'}</h3>
                            <p>Order #${order.order_number || order.id.substring(0, 8)}</p>
                            <p>Qty: ${item?.quantity || 1}</p>
                            <p>${new Date(order.created_at).toLocaleDateString()}</p>
                        </div>
                        <div class="order-meta">
                            <div class="price">₦${parseFloat(order.total || 0).toLocaleString()}</div>
                            <span class="status-badge ${statusClass}">${order.status}</span>
                        </div>
                        <div class="order-actions">
                            ${getNextAction(order)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getNextAction(order) {
            switch (order.status) {
                case 'PENDING':
                    return `<button class="action-btn primary" onclick="updateStatus('${order.id}', 'CONFIRMED')">Confirm Order</button>`;
                case 'CONFIRMED':
                    return `<button class="action-btn primary" onclick="updateStatus('${order.id}', 'PROCESSING')">Process Order</button>`;
                case 'PROCESSING':
                    return `<button class="action-btn primary" onclick="updateStatus('${order.id}', 'SHIPPED')">Mark Shipped</button>`;
                case 'SHIPPED':
                    return `<button class="action-btn primary" onclick="updateStatus('${order.id}', 'DELIVERED')">Mark Delivered</button>`;
                case 'DELIVERED':
                    return `<span class="text-green-600 text-sm"><i class="fas fa-check-circle mr-1"></i>Completed</span>`;
                default:
                    return '';
            }
        }

        async function updateStatus(orderId, newStatus) {
            const { error } = await supabase
                .from('orders')
                .update({ status: newStatus, updated_at: new Date().toISOString() })
                .eq('id', orderId);

            if (error) {
                alert('Failed to update order status');
            } else {
                await loadOrders();
            }
        }
    </script>
</body>
</html>
